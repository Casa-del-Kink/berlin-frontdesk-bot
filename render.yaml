# Render blueprint for berlin-frontdesk-bot (pilot backend).
#
# What this is: infrastructure-as-code for the Render web service. Decision record:
# wiki/decisions/2026-07-01-render-hosting-frankfurt-standard.md.
#
# Fail-closed by design: on first deploy the service WILL refuse to start until every
# `sync: false` env var below is set in the Render dashboard. That refusal is the intended
# safety behavior (see REQUIRE_LIVE_PILOT_READINESS below), not a bug to work around.
#
# Service name intentionally matches the repo name, not any placeholder brand (Tilda /
# CallTilda) -- those names are pending a deliberate rebrand. See AGENTS.md naming caveat.
services:
  - type: web
    name: berlin-frontdesk-bot
    runtime: docker
    region: frankfurt
    plan: standard
    branch: main
    # Deploys are explicit owner/agent actions during the pilot, never push-triggered.
    # A push to main must not silently roll traffic; someone decides to deploy.
    autoDeploy: false
    healthCheckPath: /health
    # Fail-closed DB check: if the target database is unreachable, the deploy itself fails
    # before traffic ever reaches a broken instance. See src/postgres-preflight.ts.
    preDeployCommand: npm run postgres:preflight
    envVars:
      # Generated by Render; never entered manually.
      - key: SERVER_TOOL_TOKEN
        generateValue: true

      # Owner enters these in the Render dashboard. Never committed here.
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_SA_JSON
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WEBHOOK_BASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: OPERATOR_TOKEN
        sync: false
      # Retention period is a compliance decision, deliberately not defaulted here.
      - key: DATA_RETENTION_DAYS
        sync: false
      # Owner must consciously set true for the internal demo phase, or configure a real
      # ownerWhatsapp in the client YAML instead.
      - key: OWNER_ALERT_LOG_ONLY_ACCEPTED
        sync: false

      # Plain values, safe to commit.
      - key: NODE_ENV
        value: production
      - key: STORE_BACKEND
        value: postgres
      - key: USE_FAKE_CALENDAR
        value: "false"
      - key: PGSSL
        value: "true"
      - key: CLIENT_FILE
        value: clients/salon-demo.yaml
      # Permanently on: fail-closed startup is the deployment safety model for this service.
      # Never toggle this off on a public runtime; real-traffic cutover is gated by Twilio
      # routing, not by disabling this guard.
      - key: REQUIRE_LIVE_PILOT_READINESS
        value: "true"
