# Config for ONE business. Adapting to another business = copy and edit this file.
# Keys are in English (project language); data values stay in the business's own
# language (here German, since it's a Berlin salon).
name: "Glanz & Schnitt Berlin"
timezone: "Europe/Berlin"
language: "de"

# Google Calendar ID to use (create a test calendar and share it with the Service Account).
# In dual-track mode this remains the Google-provider target and the calendar Cal.com should sync into.
calendarId: "ec639255e6fd2473e4ea2e1af60b996dab2f5df5fa5422047fff337ccc523938@group.calendar.google.com"

# Optional hosted Cal.com selectors for SCHEDULING_PROVIDER=calcom.
# Prefer mapping each service to a Cal.com event type once the demo account is configured.
# If this block is omitted, the provider falls back to CALCOM_EVENT_TYPE_ID or
# CALCOM_EVENT_TYPE_SLUG + CALCOM_USERNAME/CALCOM_TEAM_SLUG from .env.
# calcom:
#   defaultEventType:
#     eventTypeId: 123456
#     durationMin: 60
#   services:
#     Damenhaarschnitt:
#       eventTypeId: 123456
#       durationMin: 60
#     Herrenhaarschnitt:
#       eventTypeId: 123457
#       durationMin: 30

# Owner's WhatsApp for alerts and the daily summary. Empty = no send (log only).
# On the Twilio sandbox the owner must have joined the sandbox first.
ownerWhatsapp: ""

# Optional: existing booking system link for clients on closed booking tools.
bookingFallbackUrl: "https://example.com/book"

# Used in the first-message/privacy answer. Validate legally before real clients.
aiDisclosureText: "Hallo, hier ist Tilda von Glanz & Schnitt Berlin. Ich bin die KI-Rezeption. Wie kann ich dir helfen?"
consentText: "Wir nutzen deine Angaben, um deine Anfrage zu bearbeiten und dich zur Terminabstimmung zu kontaktieren."
privacyContact: "datenschutz@example.com"

# Triggers for immediate owner follow-up/handoff.
handoffKeywords: ["mensch", "mitarbeiter", "chef", "beschwerde", "notfall", "human", "person", "manager", "complaint"]

hours:
  days: [1, 2, 3, 4, 5, 6]   # 1=Monday ... 7=Sunday (here Mon-Sat)
  open: "09:00"
  close: "19:00"

services:
  - name: "Damenhaarschnitt"
    durationMin: 60
    price: "ab 45 €"
  - name: "Herrenhaarschnitt"
    durationMin: 30
    price: "ab 28 €"
  - name: "Färben & Strähnen"
    durationMin: 120
    price: "ab 89 €"

faq:
  - q: "Wo seid ihr?"
    a: "Beispielstraße 12, 10115 Berlin-Mitte, 2 Minuten vom U-Bahnhof Naturkundemuseum."
  - q: "Habt ihr Parkplätze?"
    a: "Direkt vorm Salon ist es begrenzt; in den Seitenstraßen findest du meist etwas."
  - q: "Kann ich mit Karte zahlen?"
    a: "Ja, Karte und bar sind beide möglich."

tone: "Warm, casual and short. Informal (duzen). Like a friendly receptionist, no robotic phrasing."
